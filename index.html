<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bentwood Interiors</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/style.css" />
    <script
      src="https://kit.fontawesome.com/f00b55dab7.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <section id="Landing">
      <div class="l-display">
        <h1 class="landing-head">Welcome to Bentwood Interiors</h1>
        <h3 class="landing-head">
          No one can shape wood like us.
        </h3>
      </div>

      <div class="row">
        <div class="col-md-6"></div>
      </div>
    </section>
    <section>
      <h1 class="display-head">Check Our Selection Of Finest Work Done</h1>
      <div class="container">
        <div class="row">
          <div id="listings" class="listings"></div>
        </div>
      </div>
    </section>

    <footer>
      <div class="row futer">
        <div class="col-lg-6">
          <h5>Contact us</h5>
          <div class="contact">
            <div class="in-contact">
              <i class="fa-solid fa-location-dot"></i>
              <p>Cape Town, South Africa</p>
            </div>
            <div class="in-contact">
              <i class="fa-solid fa-phone"></i>
              <a href="tel:0832910450">083 291 0450</a>
            </div>
            <div class="in-contact">
              <i class="fa-solid fa-envelope"></i>
              <a href = "mailto: mieftaah@gmail.com">mieftaah@gmail.com</a>
              <p></p>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <h5>Get In Contact</h5>
          <div class="input-submit">
            <form action="https://formspree.io/f/xlezkake" method="POST">
              <label>
                <input
                  type="text"
                  name="Newsletter"
                  placeholder="Enter a Text"
                />
              </label>
              <button type="submit">Submit</button>
            </form>
          </div>
        </div>
      </div>
      <div class="footer">
        <div class="fter">
          <div class="row">
            <div class="col-md-4">
              <div class="copyright">
                <p>© Bentwood Interiors - All rights reserved</p>
              </div>
            </div>
            <div class="col-md-4">
              <div class="big">
                <img src="./assets/hammer.png" alt="hammer icon" width="40" height="50" class="hammer">
                Bentwood Interiors
              </div>
            </div>
            <div class="col-md-4">
              <div class="socials">
                <i class="fa-brands fa-facebook-f"></i>
                <i class="fa-brands fa-twitter"></i>
                <i class="fa-brands fa-instagram"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </footer>
    <script src="./admin.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
